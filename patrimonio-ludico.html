<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kit: Juegos Tradicionales - ColeccionAR</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Paleta cálida y nostálgica para los juegos tradicionales */
      --fondo-crema: #FAF5E9;
      --madera: #D97736;
      --rojo-volantin: #E94F4F;
      --azul-marino: #123055;
      --blanco: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }

    body {
      background-color: var(--fondo-crema);
      color: var(--azul-marino);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      margin-top: 20px;
    }

    .marca { font-weight: 900; font-size: 1.2em; color: var(--madera); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
    h1 { font-weight: 900; font-size: 2em; line-height: 1.1; }

    /* EL PROTAGONISTA: Botón gigante de AR */
    .btn-ar-gigante {
      background-color: var(--rojo-volantin);
      color: var(--blanco);
      text-decoration: none;
      border: 4px solid var(--azul-marino);
      border-radius: 20px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 6px 6px 0px var(--azul-marino);
      transition: all 0.1s;
      margin-bottom: 30px;
    }

    .btn-ar-gigante:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px var(--azul-marino);
    }

    .btn-ar-gigante svg { width: 60px; height: 60px; fill: currentColor; margin-bottom: 10px; }
    .btn-ar-gigante span { font-weight: 900; font-size: 1.5em; text-transform: uppercase; }

    /* INSTRUCCIONES RÁPIDAS: Una oración por punto */
    .guia-rapida {
      background: var(--blanco);
      border: 3px solid var(--azul-marino);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 4px 4px 0px rgba(18, 48, 85, 0.1);
    }

    .guia-rapida h3 { font-size: 1.2em; font-weight: 800; margin-bottom: 15px; color: var(--madera); text-align: center; }

    .paso { display: flex; align-items: center; margin-bottom: 12px; }
    .paso:last-child { margin-bottom: 0; }
    .numero {
      background: var(--madera); color: var(--blanco); font-weight: 900;
      width: 30px; height: 30px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; margin-right: 15px;
    }
    .paso p { font-weight: 700; font-size: 1em; line-height: 1.3; }

    /* SEPARADOR DIVERTIDO */
    .separador { border-top: 3px dashed var(--madera); opacity: 0.3; margin: 10px 0 30px 0; }

    /* ZONA DOCENTE */
    .zona-docente {
      background-color: #E2EAF4;
      border: 3px solid var(--azul-marino);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-top: auto; /* Empuja esto hacia abajo */
    }

    .zona-docente h4 { font-weight: 800; font-size: 1.1em; margin-bottom: 10px; }
    .zona-docente p { font-size: 0.9em; margin-bottom: 15px; font-weight: 700; color: #444; }

    .btn-recursos {
      display: inline-block;
      background-color: var(--azul-marino);
      color: var(--blanco);
      text-decoration: none;
      font-weight: 800;
      padding: 12px 24px;
      border-radius: 10px;
      border: 2px solid var(--azul-marino);
      transition: opacity 0.2s;
    }

    .btn-recursos:hover { opacity: 0.9; }

  </style>
</head>
<body>

  <div class="app-container">
    
    <header>
      <div class="marca">ColeccionAR</div>
      <h1>Juegos Tradicionales</h1>
    </header>

    <!-- Acción Principal para todos -->
    <a href="ar.html" class="btn-ar-gigante">
      <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
      <span>Escanear Tarjetas</span>
    </a>

    <!-- Guía al grano -->
    <div class="guia-rapida">
      <h3>¿Cómo funciona?</h3>
      <div class="paso">
        <div class="numero">1</div>
        <p>Elige una tarjeta de tu colección.</p>
      </div>
      <div class="paso">
        <div class="numero">2</div>
        <p>Apunta con la cámara a la parte frontal de la tarjeta</p>
      </div>
      <div class="paso">
        <div class="numero">3</div>
        <p>Descubre curiosidades.</p>
      </div>
    </div>

    <div class="separador"></div>

    <!-- El Rincón para Profes -->
    <div class="zona-docente">
      <h4>Material educativo</h4>
      <p>Descarga guías y actividades imprimibles para niños.</p>
      <a href="recursos.html" class="btn-recursos">Ver recursos educativos</a>
    </div>

  </div>

  <!-- Candado de Seguridad -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const accesoKit = sessionStorage.getItem("kit");
      if (!accesoKit) {
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
