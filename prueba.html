<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Segura - Juguetes AR</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    
    /* UI superpuesta que no bloquea la cámara */
    #ui-container {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; 
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    #tarjeta-info {
      background: white;
      padding: 30px;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
      transform: translateY(100%); /* Escondida hacia abajo por defecto */
      transition: transform 0.3s ease-out;
      pointer-events: auto; 
    }

    #tarjeta-info.visible {
      transform: translateY(0); /* Sube cuando detecta el juguete */
    }

    .titulo { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #333; }
    .curiosidad { font-size: 16px; color: #666; margin-bottom: 15px; }
    
#btn-volver {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 10px 15px;
  background: white;
  border-radius: 10px;
  pointer-events: auto;
  text-decoration: none;
  color: black;
  font-weight: bold;
  z-index: 99999;
}
  </style>
</head>
<body>

  <!-- 1. LA INTERFAZ GRÁFICA -->
  <a href="index.html" id="btn-volver">← Volver</a>
  <div id="ui-container">
    <div id="tarjeta-info">
      <div class="titulo" id="ui-titulo">Buscando...</div>
      <div class="curiosidad" id="ui-curiosidad">Enfoca una tarjeta para ver la información.</div>
    </div>
  </div>

  <!-- 2. LA ESCENA DE REALIDAD AUMENTADA -->
  <!-- Cambia 'juguetes.mind' por el nombre real de tu archivo compilado -->
  <a-scene mindar-image="imageTargetSrc: ./mind/juguetes.mind;" color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="trompo-3d" src="glb/trompo.glb"></a-asset-item>
      <!-- Aquí irán el emboque, volantín, etc. -->
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity light="type: hemisphere; color: #ffffff; groundColor: #777777; intensity: 2"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 1.5" position="1 3 2"></a-entity>
    <a-entity light="type: directional; color: #d6e8fa; intensity: 1" position="-2 0 -2"></a-entity>

    <!-- Trompo (Índice 0) -->
    <a-entity mindar-image-target="targetIndex: 0" id="marcador-trompo">
      <a-gltf-model src="#trompo-3d" position="0 0 0" scale="0.2 0.2 0.2"></a-gltf-model>
    </a-entity>

    <!-- Volantín (Índice 1) - Con un cubo de prueba mientras exportas el tuyo -->
    <a-entity mindar-image-target="targetIndex: 1" id="marcador-volantin">
      <a-box color="red" position="0 0 0" scale="0.2 0.2 0.2"></a-box>
    </a-entity>

  </a-scene>

  <!-- 3. EL CEREBRO DE LA PÁGINA -->
  <script>
    // Este diccionario guarda la información de cada juguete
    const datosCartas = {
      'marcador-trompo': {
        titulo: 'El Trompo',
        curiosidad: 'Para hacerlo girar se necesita enrollar la lienza desde la púa metálica hacia arriba con precisión.'
      },
      'marcador-volantin': {
        titulo: 'El Volantín',
        curiosidad: 'Requiere palillos cruzados y tensión exacta para elevarse con el viento primaveral.'
      }
    };

    const tarjeta = document.getElementById('tarjeta-info');
    const tituloUI = document.getElementById('ui-titulo');
    const curiosidadUI = document.getElementById('ui-curiosidad');

    // Le decimos a la página que vigile todos los marcadores
    document.querySelectorAll('[mindar-image-target]').forEach((target) => {
      
      // Cuando la cámara encuentra una ilustración
      target.addEventListener('targetFound', (event) => {
        const id = event.target.getAttribute('id');
        if(datosCartas[id]) {
          tituloUI.innerText = datosCartas[id].titulo;
          curiosidadUI.innerText = datosCartas[id].curiosidad;
          tarjeta.classList.add('visible'); // Desliza la tarjeta hacia arriba
        }
      });

      // Cuando la ilustración sale de la cámara
      target.addEventListener('targetLost', () => {
        tarjeta.classList.remove('visible'); // Oculta la tarjeta deslizando hacia abajo
      });
    });
  </script>
</body>
</html>
