<!DOCTYPE html>
<html>
  <head>
    <title>WebAR - Patrimonio Lúdico</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false">
      
      <a-entity light="type: ambient; color: #ffffff; intensity: 1.0"></a-entity>

      <a-marker type="pattern" url="patt/trompo.patt">
        <a-box position="0 0.5 0" material="color: #8c2a20;" scale="0.6 0.6 0.6"></a-box>
      </a-marker>

      <a-marker type="pattern" url="patt/emboque.patt">
        <a-cylinder position="0 0.5 0" material="color: #163354;" radius="0.4" height="0.8"></a-cylinder>
      </a-marker>

      <a-marker type="pattern" url="patt/runrun.patt">
        <a-sphere position="0 0.5 0" material="color: #2e7d32;" radius="0.5"></a-sphere>
      </a-marker>

      <a-marker type="pattern" url="patt/tejo.patt">
        <a-cone position="0 0.5 0" material="color: #f57f17;" radius-bottom="0.5" height="1"></a-cone>
      </a-marker>

      <a-marker type="pattern" url="patt/volantin.patt">
        <a-plane position="0 0.5 0" rotation="-90 0 0" material="color: #6a1b9a;" width="0.8" height="0.8"></a-plane>
      </a-marker>

      <a-marker type="pattern" url="patt/polcas.patt">
        <a-torus position="0 0.5 0" rotation="90 0 0" material="color: #d84315;" radius="0.4" radius-tubular="0.1"></a-torus>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
