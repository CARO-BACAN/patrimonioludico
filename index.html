<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patrimonio Lúdico Chileno</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f6ecd8;
      color: #163354;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 600px;
      border: 4px solid #163354;
      border-radius: 12px;
      background-color: #fff;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      position: relative;
    }
    .container::before {
      content: "";
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 2px solid #8c2a20;
      pointer-events: none;
      border-radius: 8px;
    }
    h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
      color: #163354;
    }
    p {
      font-size: 1.1em;
      line-height: 1.5;
      margin-bottom: 30px;
      padding: 0 15px;
    }
    .btn {
      display: block;
      width: 80%;
      margin: 15px auto;
      padding: 15px;
      font-size: 1.2em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: transform 0.2s;
    }
    .btn-ar {
      background-color: #163354;
      color: #fff;
      border: 2px solid #163354;
    }
    .btn-recursos {
      background-color: #8c2a20;
      color: #fff;
      border: 2px solid #8c2a20;
    }
    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Patrimonio Lúdico</h1>
    <p>Explora seis juegos tradicionales chilenos mediante realidad aumentada y descubre recursos para seguir aprendiendo y creando.</p>
    
    <a href="ar.html" class="btn btn-ar">👁️ Explorar Tarjetas</a>
    <a href="recursos.html" class="btn btn-recursos">📚 Biblioteca de Recursos</a>
  </div>

</body>
</html>
