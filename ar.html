<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Patrimonio Lúdico - AR</title>
  
<script src="js/aframe.min.js"></script>
<script src="js/aframe-ar.js"></script>
<script src="js/datos.js"></script>

<script>
AFRAME.registerComponent('detector-juguete', {
  schema: { type: 'string' },
  init: function () {
    const idJuguete = this.data;

    this.el.addEventListener('markerFound', () => {
      actualizarInfo(idJuguete);
      document.getElementById('info-card').classList.remove('oculto');
    });

    this.el.addEventListener('markerLost', () => {
      document.getElementById('info-card').classList.add('oculto');
      const content = document.getElementById('info-content');
      const arrow = document.getElementById('info-arrow');
      content.style.maxHeight = null;
      content.style.paddingBottom = "0px";
      arrow.style.transform = "rotate(0deg)";
    });
  }
});
</script>

  <style>

    :root {
      --azul: #163354;
      --rojo: #8c2a20;
      --beige: #f6ecd8;
      --texto: #333333;
    }
    
    html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

a-scene {
    width:100%;
    height:100%;
}

video {
    display: block;
}

canvas.a-canvas {
    display: block;
}
    .ar-ui-top { position: fixed; top: 20px; left: 20px; z-index: 99999; }
    .ar-btn { background-color: #8c2a20; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-decoration: none; display: inline-block; }

    #btn-curiosidades-ar { 
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
      z-index: 99999; background-color: #163354; color: white; border: none; 
      padding: 14px 24px; border-radius: 30px; font-weight: bold; font-size: 1rem; 
      cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4); display: none; 
      animation: pulse 1.5s infinite; white-space: nowrap;
    }
    @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

    /* Fondo difuminado moderno y responsivo */
    .fullscreen-overlay {
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; /* Esto reemplaza el 100vw/100vh para evitar que se desborde */
      background: rgba(22, 51, 84, 0.85); 
      backdrop-filter: blur(4px); 
      z-index: 9999999;
      display: flex; 
      justify-content: center; 
      align-items: center;
      padding: 24px; /* Este es el margen seguro para las pantallas de los celulares */
      box-sizing: border-box; /* Obliga al navegador a respetar el margen */
    }

    /* Tarjeta flotante adaptativa */
    .carga-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 30px 24px;
      text-align: center;
      width: 100%; /* Esto es clave: hace que se encoja al tamaño del celular */
      max-width: 360px; /* Y esto evita que se estire gigante en tu PC */
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: popIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
    }

    .icono-camara {
      font-size: 3rem;
      margin-bottom: 5px;
    }

    .carga-card h2 {
      color: var(--azul);
      font-size: 1.6rem;
      margin-bottom: 12px;
      margin-top: 0;
    }

    .carga-card p {
      color: #555555;
      font-size: 1rem;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    /* Botón más amigable */
    .btn-comenzar {
      background-color: var(--rojo);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(140, 42, 32, 0.3);
      transition: transform 0.2s;
    }

    .btn-comenzar:active {
      transform: scale(0.95);
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .info-card {
      position: fixed; bottom: 24px; left: 24px; right: 24px;
      background: #ffffff; border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4); z-index: 99999;
      overflow: hidden; transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28), opacity 0.3s ease;
      max-width: 450px; margin: 0 auto; border: 2px solid var(--azul);
    }

    .info-card.oculto {
      transform: translateY(150%); opacity: 0; pointer-events: none;
    }

    .info-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: #ffffff; color: var(--azul);
      cursor: pointer; user-select: none;
    }

    .info-header h2 { margin: 0; font-size: 1.3rem; font-weight: 800; }
    .info-arrow { font-size: 1.2rem; transition: transform 0.4s ease; color: var(--rojo); }

    .info-content {
      max-height: 0; overflow: hidden; background: var(--beige);
      transition: max-height 0.4s ease-out, padding 0.4s ease; padding: 0 20px;
    }

    .info-content p { margin: 16px 0; font-size: 0.95rem; line-height: 1.4; color: var(--texto); }
    </style>
</head>
<body>

<!-- Pantalla de inicio para desbloquear el autoplay de la cámara -->
  <div id="pantalla-carga" class="fullscreen-overlay">
    <div class="carga-card">
      <div class="icono-camara">📸</div>
      <h2>¡Cámara lista!</h2>
      <p>Apunta con tu celular a las tarjetas de los juguetes para que cobren vida.</p>
      <button class="btn-comenzar" onclick="iniciarCamara()">Comenzar experiencia</button>
    </div>
  </div>

  <div class="ar-ui-top">
    <a href="index.html" class="ar-btn">❮ Salir</a>
  </div>

  <div id="info-card" class="info-card oculto">
    <div class="info-header" onclick="toggleInfo()">
      <h2 id="info-titulo">Juguete</h2>
      <span id="info-arrow" class="info-arrow">▲</span>
    </div>
    <div id="info-content" class="info-content">
      <p id="info-curiosidad">Acá va la curiosidad del juguete.</p>
      <button onclick="irARecursos()" class="btn-secondary">🖍 Ver actividades relacionadas</button>
    </div>
  </div>

<a-scene
    embedded
    renderer="alpha:true; antialias:true; colorManagement: true;"
    vr-mode-ui="enabled:false"
    arjs="sourceType:webcam; debugUIEnabled:false;">

  <a-entity light="type: hemisphere; color: #ffffff; groundColor: #777777; intensity: 1.5"></a-entity>
  <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="1 2 1"></a-entity>

    <a-marker type="pattern" url="patt/pattern-trompo.patt" detector-juguete="trompo">
      <a-gltf-model 
        src="glb/trompo.glb" 
        position="0 0.5 0" 
        scale="0.2 0.2 0.2" 
        rotation="0 0 0">
      </a-gltf-model>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-emboque.patt" detector-juguete="emboque">
      <a-cylinder position="0 0.5 0" material="color: #163354;" radius="0.4" height="0.8"></a-cylinder>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-runrun.patt" detector-juguete="runrun">
      <a-sphere position="0 0.5 0" material="color: #2e7d32;" radius="0.5"></a-sphere>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-tejo.patt" detector-juguete="rayuela">
      <a-cone position="0 0.5 0" material="color: #f57f17;" radius-bottom="0.5" height="1"></a-cone>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-volantin.patt" detector-juguete="volantin">
      <a-plane position="0 0.5 0" rotation="-90 0 0" material="color: #6a1b9a;" width="0.8" height="0.8"></a-plane>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-polcas.patt" detector-juguete="polcas">
      <a-torus position="0 0.5 0" rotation="90 0 0" material="color: #d84315;" radius="0.4" radius-tubular="0.1"></a-torus>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

<script>
    // 1. Quitar la pantalla inicial
    function iniciarCamara() {
      document.getElementById('pantalla-carga').style.display = 'none';
    }

    // 2. Cargar los datos del nuevo datos.js
    function actualizarInfo(id) {
      if (typeof datosJuguetes !== 'undefined' && datosJuguetes[id]) {
        const info = datosJuguetes[id];
        document.getElementById('info-titulo').innerText = info.titulo;
        document.getElementById('info-curiosidad').innerText = info.curiosidad;
      }
    }

    // 3. Abrir y cerrar la curiosidad con animación
    function toggleInfo() {
      const content = document.getElementById('info-content');
      const arrow = document.getElementById('info-arrow');
      if (content.style.maxHeight && content.style.maxHeight !== "0px") {
        content.style.maxHeight = "0px";
        content.style.paddingBottom = "0px";
        arrow.style.transform = "rotate(0deg)";
      } else {
        content.style.maxHeight = content.scrollHeight + 50 + "px";
        content.style.paddingBottom = "20px";
        arrow.style.transform = "rotate(180deg)";
      }
    }

    function irARecursos() { 
      window.location.href = 'recursos.html'; 
    }
  </script>
</body>
</html>
