<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Prueba de Marcadores AR - Patrimonio Lúdico</title>
    <!-- Importamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- Configuramos la escena para detectar marcadores tipo pattern -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;">
      
      <!-- Marcador 1: Mostrará un cubo azul -->
      <a-marker type="pattern" url="pattern-emboque-patron.png">
        <a-box position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-box>
      </a-marker>

      <!-- Marcador 2: Mostrará una esfera roja -->
      <a-marker type="pattern" url="marcador2.patt">
        <a-sphere position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-sphere>
      </a-marker>

      <!-- Marcador 3: Mostrará un cilindro azul -->
      <a-marker type="pattern" url="marcador3.patt">
        <a-cylinder position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-cylinder>
      </a-marker>

      <!-- Marcador 4: Mostrará un cono rojo -->
      <a-marker type="pattern" url="marcador4.patt">
        <a-cone position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-cone>
      </a-marker>

      <!-- Marcador 5: Mostrará un anillo (toroide) azul -->
      <a-marker type="pattern" url="marcador5.patt">
        <a-torus position="0 0.5 0" scale="0.3 0.3 0.3" color="#163354"></a-torus>
      </a-marker>

      <!-- Marcador 6: Mostrará un dodecaedro rojo -->
      <a-marker type="pattern" url="marcador6.patt">
        <a-dodecahedron position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-dodecahedron>
      </a-marker>

      <!-- Cámara de la experiencia -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
