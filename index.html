<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Patrimonio Lúdico AR</title>
    <!-- Importamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- Configuramos la escena para usar la cámara y detectar marcadores de código de barras (matriz 3x3) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <!-- Cargamos los modelos 3D optimizados -->
      <a-assets>
        <a-asset-item id="modelo1" src="juguete1.glb"></a-asset-item>
        <a-asset-item id="modelo2" src="juguete2.glb"></a-asset-item>
        <a-asset-item id="modelo3" src="juguete3.glb"></a-asset-item>
        <a-asset-item id="modelo4" src="juguete4.glb"></a-asset-item>
        <a-asset-item id="modelo5" src="juguete5.glb"></a-asset-item>
        <a-asset-item id="modelo6" src="juguete6.glb"></a-asset-item>
      </a-assets>

      <!-- Marcador 0 -->
      <a-marker type="barcode" value="0">
        <a-entity gltf-model="#modelo1" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
      </a-marker>

      <!-- Marcador 1 -->
      <a-marker type="barcode" value="1">
        <a-entity gltf-model="#modelo2" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
      </a-marker>

      <!-- Marcador 2 -->
      <a-marker type="barcode" value="2">
        <a-entity gltf-model="#modelo3" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
      </a-marker>

      <!-- Marcador 3 -->
      <a-marker type="barcode" value="3">
        <a-entity gltf-model="#modelo4" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
      </a-marker>

      <!-- Marcador 4 -->
      <a-marker type="barcode" value="4">
        <a-entity gltf-model="#modelo5" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
      </a-marker>

      <!-- Marcador 5 -->
      <a-marker type="barcode" value="5">
        <a-entity gltf-model="#modelo6" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
      </a-marker>

      <!-- Cámara de la experiencia -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
