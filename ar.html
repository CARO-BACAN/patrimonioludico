<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Meta clave para evitar zooms extraños y asegurar responsividad móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Patrimonio Lúdico - Explorar AR</title>
  
  <!-- A-Frame y AR.js con optimización móvil -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }

    /* Botón de salida fijo arriba a la izquierda */
    .ar-ui-top { position: absolute; top: 20px; left: 20px; z-index: 100; }
    .ar-btn { background-color: #8c2a20; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1em; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-decoration: none; display: inline-flex; align-items: center; }

    /* Botón de Curiosidades flotante (Oculto por defecto, aparece al detectar el marcador) */
    #btn-curiosidades-ar { 
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
      z-index: 100; background-color: #163354; color: white; border: none; 
      padding: 15px 25px; border-radius: 30px; font-weight: bold; font-size: 1.1em; 
      cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4); display: none; 
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* Modal de Curiosidades */
    #curiosities-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #fff; width: 100%; max-width: 450px; border-radius: 12px; padding: 25px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-align: left; }
    .modal-close { position: absolute; top: 15px; right: 15px; font-size: 1.5em; background: none; border: none; cursor: pointer; color: #163354; }
    
    .toy-title { font-size: 1.5em; color: #8c2a20; margin-bottom: 15px; text-align: center; }
    .curiosity-card { background: #f6ecd8; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e0d5c1; }
    .curiosity-card h4 { color: #163354; margin-bottom: 4px; font-size: 0.95em; }
    .curiosity-card p { font-size: 0.9em; color: #444; line-height: 1.3; }
    
    .btn-secondary { background-color: #8c2a20; color: #fff; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 1em; cursor: pointer; text-align: center; text-decoration: none; display: block; margin-top: 15px; }
  </style>
</head>
<body>

  <!-- Botón Salir -->
  <div class="ar-ui-top">
    <a href="index.html" class="ar-btn">❮ Salir</a>
  </div>

  <!-- Botón de Curiosidades que solo aparece al detectar un juguete -->
  <button id="btn-curiosidades-ar" onclick="abrirCuriosidades()">✨ Ver Curiosidades</button>

  <!-- Escena AR.js con configuración limpia para celulares -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" vr-mode-ui="enabled: false">
    
    <!-- 1. TROMPO (Cubo rojo) -->
    <a-marker type="pattern" url="marcador/trompo.patt" id="marker-trompo" emitevents="true">
      <a-box position="0 0.5 0" material=color: #8c2a20;" scale="0.6 0.6 0.6"></a-box>
    </a-marker>

    <!-- 2. EMBOQUE (Cilindro azul) -->
    <a-marker type="pattern" url="marcadors/emboque.patt" id="marker-emboque" emitevents="true">
      <a-cylinder position="0 0.5 0" material="color: #163354;" radius="0.4" height="0.8"></a-cylinder>
    </a-marker>

    <!-- 3. RUNRUN (Esfera verde) -->
    <a-marker type="pattern" url="marcador/runrun.patt" id="marker-runrun" emitevents="true">
      <a-sphere position="0 0.5 0" material="color: #2e7d32;" radius="0.5"></a-sphere>
    </a-marker>

    <!-- 4. RAYUELA / TEJO (Cono amarillo) -->
    <a-marker type="pattern" url="marcador/tejo.patt" id="marker-rayuela" emitevents="true">
      <a-cone position="0 0.5 0" material="color: #f57f17;" radius-bottom="0.5" height="1"></a-cone>
    </a-marker>

    <!-- 5. VOLANTÍN (Plano violeta) -->
    <a-marker type="pattern" url="marcador/volantin.patt" id="marker-volantin" emitevents="true">
      <a-plane position="0 0.5 0" rotation="-90 0 0" material="color: #6a1b9a;" width="0.8" height="0.8"></a-plane>
    </a-marker>

    <!-- 6. POLCAS (Toroide / Rosquilla anaranjada) -->
    <a-marker type="pattern" url="marcador/polcas.patt" id="marker-polcas" emitevents="true">
      <a-torus position="0 0.5 0" rotation="90 0 0" material="color: #d84315;" radius="0.4" radius-tubular="0.1"></a-torus>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- Modal dinámico de Curiosidades -->
  <div id="curiosities-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarCuriosidades()">×</button>
      <h2 class="toy-title" id="modal-titulo">Juguete</h2>
      
      <div class="curiosity-card">
        <h4>¿Cómo se juega?</h4>
        <p id="modal-juega">Texto descriptivo...</p>
      </div>
      <div class="curiosity-card">
        <h4>¿Dónde era común verlo?</h4>
        <p id="modal-donde">Texto descriptivo...</p>
      </div>
      <div class="curiosity-card">
        <h4>¿Sabías que...?</h4>
        <p id="modal-sabias">Dato curioso...</p>
      </div>

      <a href="recursos.html" class="btn-secondary">🖍 Ver actividades relacionadas</a>
    </div>
  </div>

  <script>
    // Base de datos temporal para los textos de cada juguete según el marcador detectado
    const datosJuguetes = {
      'trompo': {
        titulo: 'Trompo',
        juega: 'Se enrolla un cordinel de algodón alrededor del cuerpo de madera y se lanza con fuerza al suelo para hacerlo girar bailando sobre su punta de acero.',
        donde: 'En las esquinas de los barrios y patios de tierra durante las tardes de otoño y primavera.',
        sabias: 'Existen campeonatos donde los jugadores compiten midiendo destreza para sacar el trompo del contrincante.'
      },
      'emboque': {
        titulo: 'Emboque',
        juega: 'Se sostiene el madero en la mano y se impulsa la torre de madera hacia arriba intentando insertar el vástago en el agujero central.',
        donde: 'En plazas y corredores de casas antiguas de todo el sur de nuestro país.',
        sabias: 'Antiguamente se fabricaban artesanalmente con madera de litre o quillay tallada a mano.'
      },
      'runrun': {
        titulo: 'Runrún',
        juega: 'Se gira el disco central enroscando los hilos y luego se estira de manera rítmica para generar un zumbido constante.',
        donde: 'En los recreos escolares y juegos de barrio tradicionales.',
        sabias: 'Su nombre proviene directamente del sonido característico que produce el giro veloz del disco.'
      },
      'rayuela': {
        titulo: 'Rayuela / Tejo',
        juega: 'Se lanza un tejo metálico intentando atinar justo sobre la lienza tendida en una cancha de arcilla húmeda.',
        donde: 'En ramadas, centros de huasos y campeonatos locales a lo largo de Chile.',
        sabias: 'Es considerado un deporte nacional oficial con estrictas reglas de puntuación.'
      },
      'volantín': {
        titulo: 'Volantín',
        juega: 'Se eleva desenrollando hilo mientras el viento impulsa la estructura de papel hacia el cielo.',
        donde: 'En cerros y parques despejados durante las tardes de septiembre.',
        sabias: 'Los diseños tradicionales llevaban nombres pintorescos como la pavo, el torito o la chicha.'
      },
      'polcas': {
        titulo: 'Polcas',
        juega: 'Se traza un círculo en el suelo y se lanzan las fichas intentando chocar las de los demás compañeros para sacarlas del área.',
        donde: 'En los patios de tierra de las escuelas rurales y pasajes vecinales.',
        sabias: 'Es uno de los juegos de destreza más antiguos traspasados de generación en generación.'
      }
    };

    let jugueteActual = 'trompo'; // Por defecto

    // Detección automática de eventos de marcadores en A-Frame
    const juguetesIDs = ['trompo', 'emboque', 'runrun', 'rayuela', 'volantin', 'polcas'];

    juguetesIDs.forEach(id => {
      const marcador = document.querySelector(`#marker-${id}`);
      
      marcador.addEventListener('targetFound', () => {
        jugueteActual = id;
        document.getElementById('btn-curiosidades-ar').style.display = 'block';
        actualizarModal(id);
      });

      marcador.addEventListener('targetLost', () => {
        // Ocultar botón si el marcador sale de la cámara
        document.getElementById('btn-curiosidades-ar').style.display = 'none';
      });
    });

    function actualizarModal(id) {
      const info = datosJuguetes[id];
      if (info) {
        document.getElementById('modal-titulo').innerText = info.titulo;
        document.getElementById('modal-juega').innerText = info.juega;
        document.getElementById('modal-donde').innerText = info.donde;
        document.getElementById('modal-sabias').innerText = info.sabias;
      }
    }

    function abrirCuriosidades() {
      document.getElementById('curiosities-modal').style.display = 'flex';
    }

    function cerrarCuriosidades() {
      document.getElementById('curiosities-modal').style.display = 'none';
    }
  </script>
</body>
</html>
