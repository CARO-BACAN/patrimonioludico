<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Explorar Tarjetas - AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #notification-btn {
        position: absolute; top: 15px; left: 15px;
        background-color: #f6ecd8; border: 2px solid #163354; color: #163354;
        padding: 10px 15px; border-radius: 8px; font-weight: bold; font-family: Arial, sans-serif;
        cursor: pointer; display: none; z-index: 999; box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }
      #back-btn {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background-color: #8c2a20; color: white; text-decoration: none;
        padding: 10px 20px; border-radius: 8px; font-weight: bold; font-family: Arial, sans-serif;
        z-index: 999; border: 2px solid white; box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }
      #ui-container {
        position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
        width: 85%; max-width: 350px; background-color: #f6ecd8;
        border: 4px solid #163354; border-radius: 8px; padding: 20px;
        display: none; z-index: 1000; font-family: Arial, sans-serif; color: #333;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
      }
      #ui-container::before {
        content: ""; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
        border: 2px solid #8c2a20; pointer-events: none;
      }
      #close-btn {
        position: absolute; top: 15px; right: 15px; background: #8c2a20; color: white;
        border: none; font-weight: bold; width: 30px; height: 30px; cursor: pointer;
        border-radius: 50%; z-index: 1001;
      }
      .title { color: #163354; text-align: center; font-size: 1.8em; font-weight: bold; margin-bottom: 15px; margin-top: 5px; }
      .section-title { font-weight: bold; color: #8c2a20; margin-top: 15px; font-size: 1.1em; }
      .text-content { font-size: 0.9em; line-height: 1.5; margin-top: 10px; }
    </style>

    <script>
      const toyData = {
        'emboque': { title: 'Emboque', curiosities: 'El emboque desarrolla la coordinación entre la vista y las manos.<br><br>Existen muchas formas de jugarlo intentando embocar la pieza en distintas posiciones.<br><br>En Chile es común encontrar emboques elaborados artesanalmente en madera.' },
        'polcas': { title: 'Polcas', curiosities: 'Las primeras canicas estaban hechas de piedra, barro o arcilla antes de fabricarse en vidrio.<br><br>Existen numerosos juegos con canicas, cada uno con reglas diferentes.<br><br>Muchas personas coleccionan canicas por sus colores y diseños únicos.' },
        'runrun': { title: 'Runrún', curiosities: 'El sonido del runrún se produce porque el disco gira rápidamente y hace vibrar el aire.<br><br>Puede fabricarse con madera, plástico o incluso con botones reciclados e hilo.<br><br>Es uno de los juguetes tradicionales más simples, pero requiere coordinación.' },
        'tejo': { title: 'Rayuela', curiosities: 'El tejo consiste en lanzar una pieza metálica hacia un cajón con arcilla intentando quedar cerca del objetivo.<br><br>En Chile la rayuela fue reconocida como deporte nacional en 2014.<br><br>Existen clubes y campeonatos de rayuela en distintas regiones del país.' },
        'trompo': { title: 'Trompo', curiosities: 'Los trompos tradicionales suelen fabricarse en madera torneada y llevar una punta metálica.<br><br>En Chile existen competencias donde gana quien mantiene el trompo girando durante más tiempo.<br><br>Aunque hoy existen versiones de plástico, muchas personas prefieren la madera por su equilibrio.' },
        'volantin': { title: 'Volantín', curiosities: 'En Chile es una tradición muy ligada a las Fiestas Patrias y al inicio de la primavera.<br><br>El volantín necesita del viento para elevarse y mantenerse en el aire.<br><br>Esta ilustración representa un volantín tipo cometa, uno de los diseños más conocidos en Chile.' }
      };

      let jugueteActualEscaneado = null;

      AFRAME.registerComponent('detector-juguetes', {
        init: function () {
          this.el.addEventListener('markerFound', () => {
            let idJuguete = this.el.id.replace('marker-', '');
            jugueteActualEscaneado = idJuguete;
            const btn = document.getElementById('notification-btn');
            btn.innerText = `💡 Ver info de ${toyData[idJuguete].title}`;
            btn.style.display = 'block';
          });
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('notification-btn').addEventListener('click', () => {
          if (jugueteActualEscaneado) {
            const datos = toyData[jugueteActualEscaneado];
            document.getElementById('ui-title').innerText = datos.title;
            document.getElementById('ui-curiosities').innerHTML = datos.curiosities; 
            document.getElementById('ui-container').style.display = 'block';
            document.getElementById('notification-btn').style.display = 'none';
          }
        });
        document.getElementById('close-btn').addEventListener('click', () => {
          document.getElementById('ui-container').style.display = 'none';
        });
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <button id="notification-btn">💡 Ver info</button>
    <a href="index.html" id="back-btn">⬅ Volver</a>

    <div id="ui-container">
      <button id="close-btn">X</button>
      <div class="title" id="ui-title">Título</div>
      <div class="section-title">💡 Curiosidades</div>
      <div class="text-content" id="ui-curiosities">Texto de curiosidades...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;" vr-mode-ui="enabled: false">
      <!-- 6 Figuras primitivas diferentes para los 6 marcadores originales -->
      <a-marker id="marker-emboque" type="pattern" url="patt/pattern-emboque.patt" detector-juguetes>
        <a-box position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-box>
      </a-marker>
      <a-marker id="marker-polcas" type="pattern" url="patt/pattern-polcas.patt" detector-juguetes>
        <a-sphere position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-sphere>
      </a-marker>
      <a-marker id="marker-runrun" type="pattern" url="patt/pattern-runrun.patt" detector-juguetes>
        <a-cylinder position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-cylinder>
      </a-marker>
      <a-marker id="marker-tejo" type="pattern" url="patt/pattern-tejo.patt" detector-juguetes>
        <a-dodecahedron position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-dodecahedron>
      </a-marker>
      <a-marker id="marker-trompo" type="pattern" url="patt/pattern-trompo.patt" detector-juguetes>
        <a-cone position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-cone>
      </a-marker>
      <a-marker id="marker-volantin" type="pattern" url="patt/pattern-volantin.patt" detector-juguetes>
        <a-torus position="0 0.5 0" scale="0.3 0.3 0.3" color="#8c2a20"></a-torus>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
