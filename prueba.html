<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba MindAR - Trompo</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

  <!-- Activamos físicamente las luces correctas (physicallyCorrectLights) -->
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind;" 
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="trompo-3d" src="glb/trompo.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- EL ESTUDIO DE ILUMINACIÓN -->
    <!-- 1. Luz ambiental que baña todo suavemente -->
    <a-entity light="type: hemisphere; color: #ffffff; groundColor: #777777; intensity: 2"></a-entity>
    
    <!-- 2. Luz principal (como un sol desde arriba en diagonal) -->
    <a-entity light="type: directional; color: #ffffff; intensity: 1.5" position="1 3 2"></a-entity>
    
    <!-- 3. Luz de relleno (para que el lado oscuro del metal no quede negro) -->
    <a-entity light="type: directional; color: #d6e8fa; intensity: 1" position="-2 0 -2"></a-entity>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#trompo-3d" position="0 0 0" scale="0.2 0.2 0.2" rotation="0 0 0"></a-gltf-model>
    </a-entity>
    
  </a-scene>
</body>
</html>
