<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR - Patrimonio Lúdico</title>
  
  <!-- Librerías estables vía CDN (las que funcionan en celulares) -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }

    /* Pantalla táctil de inicio para desbloquear la cámara obligatoriamente */
    #pantalla-carga {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
      background: #163354; color: #ffffff; z-index: 9999999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 5%; box-sizing: border-box; cursor: pointer;
    }
    #pantalla-carga h2 { font-size: 1.5rem; margin-bottom: 10px; }
    #pantalla-carga p { font-size: 1rem; max-width: 500px; color: #f6ecd8; line-height: 1.5; margin-bottom: 20px; }
    .texto-empezar { font-size: 0.8rem; color: #f6ecd8; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; background-color: #8c2a20; padding: 12px 24px; border-radius: 8px; }

    /* Botón de salida */
    .ar-ui-top { position: absolute; top: 20px; left: 20px; z-index: 99999; }
    .ar-btn { background-color: #8c2a20; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1em; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }

    /* Botón flotante de Curiosidades */
    #btn-curiosidades-ar { 
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
      z-index: 99999; background-color: #163354; color: white; border: none; 
      padding: 15px 25px; border-radius: 30px; font-weight: bold; font-size: 1.1em; 
      cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4); display: none; 
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* Modal */
    #curiosities-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 1000000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #fff; width: 100%; max-width: 450px; border-radius: 12px; padding: 25px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-align: left; }
    .modal-close { position: absolute; top: 15px; right: 15px; font-size: 1.5em; background: none; border: none; cursor: pointer; color: #163354; }
    .toy-title { font-size: 1.5em; color: #8c2a20; margin-bottom: 15px; text-align: center; }
    .curiosity-card { background: #f6ecd8; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e0d5c1; }
    .curiosity-card h4 { color: #163354; margin-bottom: 4px; font-size: 0.95em; }
    .curiosity-card p { font-size: 0.9em; color: #444; line-height: 1.3; }
  </style>

  <script>
    function iniciarExperiencia() {
      const pantalla = document.getElementById('pantalla-carga');
      pantalla.style.opacity = '0';
      setTimeout(() => { pantalla.style.display = 'none'; }, 800);
    }

    const datosJuguetes = {
      'trompo': {
        titulo: 'Trompo',
        juega: 'Se enrolla un cordinel de algodón alrededor del cuerpo de madera y se lanza con fuerza al suelo.',
        donde: 'En las esquinas de los barrios y patios de tierra.',
        sabias: 'Existen campeonatos donde los jugadores compiten midiendo destreza.'
      },
      'emboque': {
        titulo: 'Emboque',
        juega: 'Se sostiene el madero y se impulsa la torre hacia arriba intentando insertar el vástago.',
        donde: 'En plazas y corredores de casas antiguas.',
        sabias: 'Antiguamente se fabricaban artesanalmente con madera de litre o quillay.'
      },
      'runrun': {
        titulo: 'Runrún',
        juega: 'Se gira el disco central enroscando los hilos y se estira rítmicamente.',
        donde: 'En los recreos escolares y juegos de barrio.',
        sabias: 'Su nombre proviene del sonido característico que produce el giro.'
      },
      'rayuela': {
        titulo: 'Rayuela / Tejo',
        juega: 'Se lanza un tejo metálico intentando atinar sobre la lienza en arcilla húmeda.',
        donde: 'En ramadas y campeonatos locales a lo largo de Chile.',
        sabias: 'Es considerado un deporte nacional oficial.'
      },
      'volantín': {
        titulo: 'Volantín',
        juega: 'Se eleva desenrollando hilo mientras el viento impulsa la estructura de papel.',
        donde: 'En cerros y parques despejados en septiembre.',
        sabias: 'Los diseños tradicionales llevaban nombres como la pavo o el torito.'
      },
      'polcas': {
        titulo: 'Polcas',
        juega: 'Se traza un círculo y se lanzan fichas para chocar las de los demás.',
        donde: 'En patios de tierra de escuelas rurales.',
        sabias: 'Es uno de los juegos de destreza más antiguos.'
      }
    };

    AFRAME.registerComponent('detector-juguete', {
      schema: { type: 'string' },
      init: function () {
        const idJuguete = this.data;
        this.el.addEventListener('markerFound', () => {
          document.getElementById('btn-curiosidades-ar').style.display = 'block';
          actualizarModal(idJuguete);
        });
        this.el.addEventListener('markerLost', () => {
          document.getElementById('btn-curiosidades-ar').style.display = 'none';
        });
      }
    });

    function actualizarModal(id) {
      const info = datosJuguetes[id];
      if (info) {
        document.getElementById('modal-titulo').innerText = info.titulo;
        document.getElementById('modal-juega').innerText = info.juega;
        document.getElementById('modal-donde').innerText = info.donde;
        document.getElementById('modal-sabias').innerText = info.sabias;
      }
    }

    function abrirCuriosidades() {
      document.getElementById('curiosities-modal').style.display = 'flex';
    }

    function cerrarCuriosidades() {
      document.getElementById('curiosities-modal').style.display = 'none';
    }
  </script>
</head>
<body style="margin: 0px; overflow: hidden;">

  <!-- Pantalla de inicio para forzar la cámara -->
  <div id="pantalla-carga" onclick="iniciarExperiencia()">
    <h2>Activar Realidad Aumentada</h2>
    <p>Toca la pantalla para encender la cámara y comenzar a escanear.</p>
    <div class="texto-empezar">Tocar para empezar</div>
  </div>

  <div class="ar-ui-top">
    <a href="index.html" class="ar-btn">❮ Salir</a>
  </div>

  <button id="btn-curiosidades-ar" onclick="abrirCuriosidades()">✨ Ver Curiosidades</button>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="colorManagement: true;">
    <a-entity light="type: ambient; color: #ffffff; intensity: 1.0"></a-entity>

    <a-marker type="pattern" url="patt/trompo.patt" detector-juguete="trompo">
      <a-box position="0 0.5 0" material="color: #8c2a20;" scale="0.6 0.6 0.6"></a-box>
    </a-marker>

    <a-marker type="pattern" url="patt/emboque.patt" detector-juguete="emboque">
      <a-cylinder position="0 0.5 0" material="color: #163354;" radius="0.4" height="0.8"></a-cylinder>
    </a-marker>

    <a-marker type="pattern" url="patt/runrun.patt" detector-juguete="runrun">
      <a-sphere position="0 0.5 0" material="color: #2e7d32;" radius="0.5"></a-sphere>
    </a-marker>

    <a-marker type="pattern" url="patt/tejo.patt" detector-juguete="rayuela">
      <a-cone position="0 0.5 0" material="color: #f57f17;" radius-bottom="0.5" height="1"></a-cone>
    </a-marker>

    <a-marker type="pattern" url="patt/volantin.patt" detector-juguete="volantin">
      <a-plane position="0 0.5 0" rotation="-90 0 0" material="color: #6a1b9a;" width="0.8" height="0.8"></a-plane>
    </a-marker>

    <a-marker type="pattern" url="patt/polcas.patt" detector-juguete="polcas">
      <a-torus position="0 0.5 0" rotation="90 0 0" material="color: #d84315;" radius="0.4" radius-tubular="0.1"></a-torus>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div id="curiosities-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarCuriosidades()">×</button>
      <h2 class="toy-title" id="modal-titulo">Juguete</h2>
      <div class="curiosity-card"><h4>¿Cómo se juega?</h4><p id="modal-juega">-</p></div>
      <div class="curiosity-card"><h4>¿Dónde era común verlo?</h4><p id="modal-donde">-</p></div>
      <div class="curiosity-card"><h4>¿Sabías que...?</h4><p id="modal-sabias">-</p></div>
    </div>
  </div>

</body>
</html>
