<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Prueba de Marcadores AR - Patrimonio Lúdico</title>
    <!-- Importamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- Desactivamos el botón VR y configuramos la escena AR.js -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;" vr-mode-ui="enabled: false">
      
      <!-- Marcador 1: Emboque -->
      <a-marker type="pattern" url="patt/pattern-emboque.patt">
        <a-box position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-box>
      </a-marker>

      <!-- Marcador 2: Polcas -->
      <a-marker type="pattern" url="patt/pattern-polcas.patt">
        <a-sphere position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-sphere>
      </a-marker>

      <!-- Marcador 3: Runrun -->
      <a-marker type="pattern" url="patt/pattern-runrun.patt">
        <a-cylinder position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-cylinder>
      </a-marker>

      <!-- Marcador 4: Tejo -->
      <a-marker type="pattern" url="patt/pattern-tejo.patt">
        <a-dodecahedron position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-dodecahedron>
      </a-marker>

      <!-- Marcador 5: Trompo -->
      <a-marker type="pattern" url="patt/pattern-trompo.patt">
        <a-cylinder position="0 0.5 0" scale="0.5 0.5 0.5" color="#163354"></a-cylinder>
      </a-marker>

      <!-- Marcador 6: Volantín -->
      <a-marker type="pattern" url="patt/pattern-volantin.patt">
        <a-dodecahedron position="0 0.5 0" scale="0.5 0.5 0.5" color="#8c2a20"></a-dodecahedron>
      </a-marker>

      <!-- Cámara de la experiencia -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
