<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Patrimonio Lúdico - AR</title>
  
<script src="js/aframe.min.js"></script>
<script src="js/aframe-ar.js"></script>
<script src="js/datos.js"></script>

<script>
AFRAME.registerComponent('detector-juguete', {
  schema: { type: 'string' },
  init: function () {
    const idJuguete = this.data;

    this.el.addEventListener('markerFound', () => {
    document.getElementById('btn-curiosidades-ar').style.display = 'block';
    actualizarModal(idJuguete);

    if (
        document.getElementById('curiosities-modal').style.display === 'flex'
    ) {
        actualizarModal(idJuguete);
    }
});

    this.el.addEventListener('markerLost', () => {
      document.getElementById('btn-curiosidades-ar').style.display = 'none';
    });
  }
});
</script>

  <style>

    :root {
      --azul: #163354;
      --rojo: #8c2a20;
      --beige: #f6ecd8;
      --texto: #333333;
    }
    
    html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

a-scene {
    width:100%;
    height:100%;
}

video {
    display: block;
}

canvas.a-canvas {
    display: block;
}
    .ar-ui-top { position: fixed; top: 20px; left: 20px; z-index: 99999; }
    .ar-btn { background-color: #8c2a20; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-decoration: none; display: inline-block; }

    #btn-curiosidades-ar { 
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
      z-index: 99999; background-color: #163354; color: white; border: none; 
      padding: 14px 24px; border-radius: 30px; font-weight: bold; font-size: 1rem; 
      cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4); display: none; 
      animation: pulse 1.5s infinite; white-space: nowrap;
    }
    @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

    /* Fondo difuminado moderno y responsivo */
    .fullscreen-overlay {
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; /* Esto reemplaza el 100vw/100vh para evitar que se desborde */
      background: rgba(22, 51, 84, 0.85); 
      backdrop-filter: blur(4px); 
      z-index: 9999999;
      display: flex; 
      justify-content: center; 
      align-items: center;
      padding: 24px; /* Este es el margen seguro para las pantallas de los celulares */
      box-sizing: border-box; /* Obliga al navegador a respetar el margen */
    }

    /* Tarjeta flotante adaptativa */
    .carga-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 30px 24px;
      text-align: center;
      width: 100%; /* Esto es clave: hace que se encoja al tamaño del celular */
      max-width: 360px; /* Y esto evita que se estire gigante en tu PC */
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: popIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
    }

    .icono-camara {
      font-size: 3rem;
      margin-bottom: 5px;
    }

    .carga-card h2 {
      color: var(--azul);
      font-size: 1.6rem;
      margin-bottom: 12px;
      margin-top: 0;
    }

    .carga-card p {
      color: #555555;
      font-size: 1rem;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    /* Botón más amigable */
    .btn-comenzar {
      background-color: var(--rojo);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(140, 42, 32, 0.3);
      transition: transform 0.2s;
    }

    .btn-comenzar:active {
      transform: scale(0.95);
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #curiosities-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 1000000; align-items: center; justify-content: center; padding: 15px; }
    .modal-content { background: #fff; width: 100%; max-width: 450px; border-radius: 12px; padding: 20px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-align: left; }
    .modal-close { position: absolute; top: 12px; right: 15px; font-size: 1.5rem; background: none; border: none; cursor: pointer; color: #163354; }
    .toy-title { font-size: 1.4rem; color: #8c2a20; margin-bottom: 12px; text-align: center; }
    .curiosity-card { background: #f6ecd8; padding: 10px 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e0d5c1; }
    .curiosity-card h4 { color: #163354; margin-bottom: 3px; font-size: 0.9rem; }
    .curiosity-card p { font-size: 0.85rem; color: #333333; line-height: 1.3; }
    .btn-secondary { background-color: #8c2a20; color: #fff; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; display: block; margin-top: 12px; }
    
    </style>
</head>
<body>

<!-- Pantalla de inicio para desbloquear el autoplay de la cámara -->
  <div id="pantalla-carga" class="fullscreen-overlay">
    <div class="carga-card">
      <div class="icono-camara">📸</div>
      <h2>¡Cámara lista!</h2>
      <p>Apunta con tu celular a las tarjetas de los juguetes para que cobren vida.</p>
      <button class="btn-comenzar" onclick="iniciarCamara()">Comenzar experiencia</button>
    </div>
  </div>

  <div class="ar-ui-top">
    <a href="index.html" class="ar-btn">❮ Salir</a>
  </div>

  <button id="btn-curiosidades-ar" onclick="abrirCuriosidades()">✨ Ver Curiosidades</button>


  <a-scene
    embedded
    renderer="alpha:true; antialias:false"
    vr-mode-ui="enabled:false"
    arjs="sourceType:webcam; debugUIEnabled:false;">
    
    <a-entity light="type: ambient; color: #ffffff; intensity: 2"></a-entity>

<a-entity 
light="type: directional; 
color: #ffffff; 
intensity: 1"
position="0 2 1">
</a-entity>

    <a-marker type="pattern" url="patt/pattern-trompo.patt" detector-juguete="trompo">
      <a-box 
position="0 0.5 0"
width="1"
height="1"
depth="1"></a-box>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-emboque.patt" detector-juguete="emboque">
      <a-cylinder position="0 0.5 0" material="color: #163354;" radius="0.4" height="0.8"></a-cylinder>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-runrun.patt" detector-juguete="runrun">
      <a-sphere position="0 0.5 0" material="color: #2e7d32;" radius="0.5"></a-sphere>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-tejo.patt" detector-juguete="rayuela">
      <a-cone position="0 0.5 0" material="color: #f57f17;" radius-bottom="0.5" height="1"></a-cone>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-volantin.patt" detector-juguete="volantin">
      <a-plane position="0 0.5 0" rotation="-90 0 0" material="color: #6a1b9a;" width="0.8" height="0.8"></a-plane>
    </a-marker>
    <a-marker type="pattern" url="patt/pattern-polcas.patt" detector-juguete="polcas">
      <a-torus position="0 0.5 0" rotation="90 0 0" material="color: #d84315;" radius="0.4" radius-tubular="0.1"></a-torus>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div id="curiosities-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarCuriosidades()">×</button>
      <h2 class="toy-title" id="modal-titulo">Juguete</h2>
      <div class="curiosity-card"><h4>¿Cómo se juega?</h4><p id="modal-juega"></p></div>
      <div class="curiosity-card"><h4>¿Dónde era común verlo?</h4><p id="modal-donde"></p></div>
      <div class="curiosity-card"><h4>¿Sabías que...?</h4><p id="modal-sabias"></p></div>
      <button onclick="irARecursos()" class="btn-secondary">🖍 Ver actividades relacionadas</button>
    </div>
  </div>

  <script>
    // 1. Quitar el bloqueador con un simple clic
    function iniciarCamara() {
      document.getElementById('pantalla-carga').style.display = 'none';
    }

    // 2. Cerrar curiosidades al volver a la página o tocar fuera del modal
    window.addEventListener("pageshow", function(event) {
      if (event.persisted) {
        document.getElementById('btn-curiosidades-ar').style.display = 'none';
        cerrarCuriosidades();
      }
    });

    document.getElementById('curiosities-modal').addEventListener('click', function(e) {
      if (e.target === this) cerrarCuriosidades();
    });


    function actualizarModal(id) {
      if (typeof datosJuguetes !== 'undefined' && datosJuguetes[id]) {
        const info = datosJuguetes[id];
        document.getElementById('modal-titulo').innerText = info.titulo;
        document.getElementById('modal-juega').innerText = info.juega;
        document.getElementById('modal-donde').innerText = info.donde;
        document.getElementById('modal-sabias').innerText = info.sabias;
      }
    }

    function abrirCuriosidades() { document.getElementById('curiosities-modal').style.display = 'flex'; }
    function cerrarCuriosidades() { document.getElementById('curiosities-modal').style.display = 'none'; }
    function irARecursos() { window.location.href = 'recursos.html'; }
  </script>
</body>
</html>
